<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Danah Tarot</title>

<link
href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Noto Sans KR',sans-serif;

background:#FFF8F8;

max-width:760px;

margin:auto;

overflow-x:hidden;

padding-bottom:80px;

color:#444;

}

/* 메인 */

.mainWrap{

position:relative;

padding:18px;

}

.mainWrap img{

width:100%;

display:block;

border-radius:18px;

box-shadow:0 8px 24px rgba(0,0,0,.08);

}

/* 상담 가능 */

.status{

position:absolute;

top:34px;

right:34px;

z-index:10;

background:rgba(255,255,255,.96);

padding:8px 14px;

border-radius:999px;

font-size:12px;

font-weight:700;

backdrop-filter:blur(10px);

box-shadow:0 8px 24px rgba(0,0,0,.16);

color:#D96B92;

}

/* 섹션 */

.section{

padding:18px;

}

.section img{

width:100%;

display:block;

border-radius:18px;

box-shadow:0 8px 24px rgba(0,0,0,.08);

}

/* 공지 */

.noticeWrap,
.reviewWrap,
.faqWrap{

padding:0 18px 40px;

}

.notice-card{

background:#FFFFFF;

border:1px solid #F3DCE4;

border-radius:14px;

padding:18px;

margin-bottom:12px;

line-height:1.8;

box-shadow:0 2px 10px rgba(0,0,0,.04);

font-size:15px;

}

/* 리뷰 */

.review-card{

background:#FFFFFF;

border:1px solid #F3DCE4;

border-radius:14px;

padding:18px;

margin-bottom:12px;

box-shadow:0 2px 10px rgba(0,0,0,.04);

}

.review-inner{

display:flex;

gap:12px;

align-items:flex-start;

}

.review-badge{

width:30px;

height:30px;

border-radius:999px;

background:#F8E6EC;

display:flex;

align-items:center;

justify-content:center;

font-size:13px;

font-weight:700;

color:#D96B92;

flex-shrink:0;

}

.review-text{

line-height:1.8;

font-size:15px;

color:#555;

}

/* FAQ */

.faq-card{

background:#FFFFFF;

border:1px solid #F3DCE4;

border-radius:14px;

padding:18px;

margin-bottom:12px;

box-shadow:0 2px 10px rgba(0,0,0,.04);

transition:.25s;

}

.question{

display:flex;

justify-content:space-between;

align-items:center;

cursor:pointer;

font-size:16px;

font-weight:700;

color:#4B3434;

}

.question-left{

display:flex;

align-items:center;

gap:10px;

}

.q-badge{

width:28px;

height:28px;

border-radius:999px;

background:#F8E6EC;

display:flex;

align-items:center;

justify-content:center;

font-size:13px;

font-weight:700;

color:#D96B92;

}

.answer{

display:none;

padding-top:18px;

line-height:1.8;

font-size:15px;

color:#666;

}

.answer-inner{

display:flex;

gap:10px;

}

.a-badge{

width:28px;

height:28px;

border-radius:999px;

background:#FFF1F5;

display:flex;

align-items:center;

justify-content:center;

font-size:13px;

font-weight:700;

color:#E47A9C;

flex-shrink:0;

}

.faq-card.open .answer{

display:block;

}

/* 모바일 */

@media(max-width:600px){

.status{

top:28px;

right:28px;

font-size:11px;

}

}

</style>

</head>

<body>

<!-- 메인 -->

<div class="mainWrap">

<div
class="status"
id="status">

🟢 상담 가능

</div>

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/main-cover.jpg">

</a>

</div>

<!-- 공지 -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/info.png">

</div>

<div class="noticeWrap">

<div id="noticeBox"></div>

</div>

<!-- 스토리 -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/story.png">

</div>

<!-- 상담 과정 -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/process-bg.jpg">

</div>

<!-- WHY -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/why-danah.jpg">

</a>

</div>

<!-- 후기 제목 -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/review-title.png">

</div>

<!-- 후기 -->

<div class="reviewWrap">

<div id="reviews"></div>

</div>

<!-- 가격 -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/price.png">

</a>

</div>

<!-- FAQ 제목 -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/faq-title.png">

</div>

<!-- FAQ -->

<div class="faqWrap">

<div id="faqBox"></div>

</div>

<!-- CTA -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/cta.png">

</a>

</div>

<!-- Supabase -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(

"https://fuwojigmgsvxennydcfz.supabase.co",

"sb_publishable_rzsuJsbir1oa5-vIiE_z-A_f6THK57w"

)

/* 상담 상태 */

async function loadStatus(){

const { data } = await supabase

.from("status")

.select("*")

.eq("id",1)

.single()

if(data){

document.getElementById("status").innerText =
data.status

}

}

/* 공지 */

async function loadNotice(){

const { data } = await supabase

.from("notice")

.select("*")

.order("id",{ascending:false})

if(!data) return

document.getElementById("noticeBox").innerHTML =

data.map(x => `

<div class="notice-card">

📢 ${x.content}

</div>

`).join("")

}

/* 후기 */

async function loadReview(){

const { data } = await supabase

.from("reviews")

.select("content")

.order("id",{ascending:false})

if(!data) return

document.getElementById("reviews").innerHTML =

data.map(x => `

<div class="review-card">

<div class="review-inner">

<div class="review-badge">

후기

</div>

<div class="review-text">

${x.content}

</div>

</div>

</div>

`).join("")

}

/* FAQ */

async function loadFAQ(){

const { data } = await supabase

.from("faq")

.select("question,answer")

.order("id",{ascending:true})

if(!data) return

document.getElementById("faqBox").innerHTML =

data.map((x,i)=>`

<div class="faq-card" id="faq-${i}">

<div
class="question"
onclick="toggleFAQ(${i})">

<div class="question-left">

<div class="q-badge">

Q

</div>

<span>

${x.question}

</span>

</div>

<span>

▼

</span>

</div>

<div class="answer">

<div class="answer-inner">

<div class="a-badge">

A

</div>

<div>

${x.answer}

</div>

</div>

</div>

</div>

`).join("")

}

/* FAQ 토글 */

function toggleFAQ(i){

document
.getElementById(`faq-${i}`)
.classList.toggle("open")

}

/* 실행 */

loadStatus()

loadNotice()

loadReview()

loadFAQ()

</script>

</body>

</html>
