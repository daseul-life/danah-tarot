<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Danah's tarot</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link
href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:#fff9f7;

font-family:
'Noto Serif KR',
serif;

overflow-x:hidden;

color:#5c4338;

}

.container{

max-width:1000px;

margin:auto;

padding-bottom:120px;

}

/* 메인 */

.hero{

text-align:center;

}

.hero img{

width:100%;

display:block;

}

.main-glow{

animation:
glow 3s
ease-in-out
infinite;

}

@keyframes glow{

0%{

filter:
drop-shadow(
0 0 8px
rgba(255,215,225,.4)
);

}

50%{

filter:
drop-shadow(
0 0 18px
rgba(255,180,215,.8)
);

}

100%{

filter:
drop-shadow(
0 0 8px
rgba(255,215,225,.4)
);

}

}

/* 버튼 */

.reserve-wrap{

display:flex;

justify-content:center;

margin-top:55px;

margin-bottom:90px;

}

.reserve-btn{

background:#f8dde3;

padding:

18px 56px;

border-radius:12px;

text-decoration:none;

font-size:22px;

font-weight:600;

color:#6b4d45;

box-shadow:

0 5px 16px
rgba(
220,
180,
190,
.18
);

transition:.3s;

}

.reserve-btn:hover{

background:#f4d3db;

transform:

translateY(-2px);

}

/* 제목 */

.section-title{

text-align:center;

font-size:54px;

font-weight:700;

line-height:1.45;

margin-bottom:90px;

color:#5d4338;

}

/* 카드 */

.card-section{

display:flex;

align-items:center;

gap:60px;

padding:0 28px;

margin-bottom:140px;

}

/* 카드 이미지 */

.card-image{

width:100%;

max-width:390px;

height:auto;

object-fit:contain;

transition:.45s;

filter:

drop-shadow(
0 10px 18px
rgba(
255,
190,
210,
0.18
)
);

}

.card-image:hover{

transform:

scale(1.03)
rotate(-1deg);

filter:

drop-shadow(
0 15px 25px
rgba(
255,
190,
210,
0.28
)
);

}

/* 오른쪽 설명 */

.card-content{

flex:1;

max-width:500px;

animation:

fadeUp 1.3s ease,

textFloat 5s
ease-in-out
infinite;

}

.card-content h2{

font-size:52px;

margin-bottom:22px;

}

.card-content p{

font-size:28px;

line-height:1.85;

color:#7a6157;

}

@keyframes fadeUp{

0%{

opacity:0;

transform:

translateY(20px);

}

100%{

opacity:1;

transform:

translateY(0);

}

}

@keyframes textFloat{

0%{

transform:

translateY(0);

}

50%{

transform:

translateY(-4px);

}

100%{

transform:

translateY(0);

}

}

/* 전체 이미지 */

.full-section{

display:flex;

justify-content:center;

padding:0 20px;

margin:120px 0;

}

.full-section img{

width:100%;

max-width:900px;

display:block;

height:auto;

}

/* consultation */

.consultation{

animation:

consultFade 1.5s ease;

}

@keyframes consultFade{

0%{

opacity:0;

transform:

translateY(30px);

}

100%{

opacity:1;

transform:

translateY(0);

}

}

/* 마지막 */

.ending{

animation:

endFloat 5s
ease-in-out
infinite;

}

@keyframes endFloat{

0%{

transform:

translateY(0);

opacity:.94;

}

50%{

transform:

translateY(-6px);

opacity:1;

}

100%{

transform:

translateY(0);

opacity:.94;

}

}

/* 모바일 */

@media(max-width:768px){

.reserve-btn{

font-size:20px;

padding:

17px 42px;

}

.section-title{

font-size:36px;

padding:0 20px;

}

.card-section{

flex-direction:column;

gap:35px;

padding:0 20px;

margin-bottom:100px;

}

.card-image{

max-width:320px;

}

.card-content{

text-align:center;

}

.card-content h2{

font-size:34px;

}

.card-content p{

font-size:22px;

}

}

</style>

</head>

<body>

<div class="container">

<section class="hero">

<img
src="images/main.png"
class="main-glow">

</section>

<div class="reserve-wrap">

<a

href="https://open.kakao.com/me/DanahsTarot"

target="_blank"

class="reserve-btn">

문의예약하기

</a>

</div>

<div class="section-title">

어떤 이야기가<br>

궁금하신가요?

</div>

<section class="card-section">

<img
src="images/love.png"
class="card-image">

<div class="card-content">

<h2>연애운 타로</h2>

<p>

썸 · 재회 · 속마음 · 미래 흐름

<br>

마음을 함께 읽어드립니다.

</p>

</div>

</section>

<section class="card-section">

<img
src="images/money.png"
class="card-image">

<div class="card-content">

<h2>금전운 타로</h2>

<p>

이직운 · 승진운 · 재물 흐름

<br>

현실의 방향을 살펴봅니다.

</p>

</div>

</section>

<section class="card-section">

<img
src="images/family.png"
class="card-image">

<div class="card-content">

<h2>가족운 타로</h2>

<p>

가족 관계 · 감정 흐름 · 임신운

<br>

함께 흐름을 읽어드립니다.

</p>

</div>

</section>

<section class="card-section">

<img
src="images/health.png"
class="card-image">

<div class="card-content">

<h2>건강운 타로</h2>

<p>

몸과 마음 · 에너지 흐름

<br>

균형의 방향을 살펴봅니다.

</p>

</div>

</section>

<section class="card-section">

<img
src="images/psy.png"
class="card-image">

<div class="card-content">

<h2>심리 타로</h2>

<p>

감정 흐름 · 내면 · 심리 변화

<br>

마음을 함께 들여다봅니다.

</p>

</div>

</section>

<section
class="full-section consultation">

<img
src="images/consultation.png">

</section>

<section
class="full-section">

<img
src="images/price.png">

</section>

<section
class="full-section ending">

<img
src="images/end.png">

</section>

<div class="reserve-wrap">

<a

href="https://open.kakao.com/me/DanahsTarot"

target="_blank"

class="reserve-btn">

문의예약하기

</a>

</div>

</div>

</body>

</html>
