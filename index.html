<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1.0">

<title>Danah Tarot</title>

<link
href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

background:#FFF9F7;

font-family:
'Noto Serif KR',
serif;

overflow-x:hidden;

color:#5B4338;

}

.container{

max-width:1000px;

margin:auto;

padding-bottom:120px;

}

/* 메인 */

.hero{

text-align:center;

}

.hero img{

width:100%;

display:block;

animation:

mainFloat 5s
ease-in-out
infinite,

glow 3s
ease-in-out
infinite;

}

@keyframes mainFloat{

0%{

transform:
translateY(0px);

}

50%{

transform:
translateY(-8px);

}

100%{

transform:
translateY(0px);

}

}

@keyframes glow{

0%{

filter:
drop-shadow(
0 0 8px
rgba(
255,
220,
230,
0.2
)
);

}

50%{

filter:
drop-shadow(
0 0 18px
rgba(
255,
190,
210,
0.5
)
);

}

100%{

filter:
drop-shadow(
0 0 8px
rgba(
255,
220,
230,
0.2
)
);

}

}

/* 예약 */

.reserve-wrap{

display:flex;

justify-content:center;

margin:

60px 0
90px;

}

.reserve-btn{

background:#F8DDE3;

padding:

18px 56px;

border-radius:12px;

font-size:22px;

font-weight:600;

text-decoration:none;

color:#6A4D45;

transition:.3s;

box-shadow:

0 6px 18px
rgba(
220,
180,
190,
0.18
);

}

.reserve-btn:hover{

transform:

translateY(-4px);

}

/* 제목 */

.section-title{

text-align:center;

font-size:54px;

line-height:1.5;

margin-bottom:100px;

animation:

titleFloat 6s
ease-in-out
infinite;

}

@keyframes titleFloat{

0%{

transform:

translateY(0px);

}

25%{

transform:

translateY(-2px);

}

50%{

transform:

translateY(-5px);

}

75%{

transform:

translateY(-2px);

}

100%{

transform:

translateY(0px);

}

}

/* 카드 */

.card-section{

display:flex;

align-items:center;

justify-content:center;

gap:70px;

padding:0 30px;

margin-bottom:140px;

}

.card-image{

width:100%;

max-width:390px;

animation:

cardFloat 5s
ease-in-out
infinite;

transition:.4s;

}

.card-image:hover{

transform:

translateY(-8px)

scale(1.03);

}

@keyframes cardFloat{

0%{

transform:

translateY(0px)

rotate(-1deg);

}

50%{

transform:

translateY(-8px)

rotate(1deg);

}

100%{

transform:

translateY(0px)

rotate(-1deg);

}

}

.card-content{

flex:1;

animation:

textFloat 5s
ease-in-out
infinite;

}

.card-content h2{

font-size:52px;

margin-bottom:20px;

}

.card-content p{

font-size:28px;

line-height:1.8;

color:#7D6558;

}

@keyframes textFloat{

0%{

transform:

translateY(0px);

}

50%{

transform:

translateY(-4px);

}

100%{

transform:

translateY(0px);

}

}

/* 전체이미지 */

.full-section{

display:flex;

justify-content:center;

padding:0 15px;

margin:100px 0;

}

.full-section img{

width:100%;

max-width:900px;

display:block;

}

.ending{

animation:

endingFloat 5s
ease-in-out
infinite;

}

@keyframes endingFloat{

0%{

transform:

translateY(0px);

}

50%{

transform:

translateY(-5px);

}

100%{

transform:

translateY(0px);

}

}

/* 모바일 */

@media(max-width:768px){

.section-title{

font-size:38px;

padding:0 20px;

}

.card-section{

flex-direction:column;

gap:35px;

padding:0 20px;

}

.card-content{

text-align:center;

}

.card-content h2{

font-size:34px;

}

.card-content p{

font-size:20px;

}

.card-image{

max-width:320px;

}

.reserve-btn{

font-size:18px;

padding:

16px 40px;

}

}

</style>

</head>

<body>

<div class="container">

<section class="hero">

<img src="main.png">

</section>

<div class="reserve-wrap">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank"
class="reserve-btn">

문의예약하기

</a>

</div>

<div class="section-title">

어떤 이야기가<br>

궁금하신가요?

</div>

<section class="card-section">

<img src="love.png" class="card-image">

<div class="card-content">

<h2>연애운 타로</h2>

<p>

썸 · 재회 · 속마음 · 미래 흐름

<br>

온마음으로 흐름을 읽어드립니다.

</p>

</div>

</section>

<section class="card-section">

<img src="money.png" class="card-image">

<div class="card-content">

<h2>금전운 타로</h2>

<p>

재물 · 승진 · 이직 · 방향성

<br>

현실의 흐름을 함께 읽어드립니다.

</p>

</div>

</section>

<section class="card-section">

<img src="family.png" class="card-image">

<div class="card-content">

<h2>가족운 타로</h2>

<p>

가족 관계 · 감정 흐름 · 미래 방향

<br>

온마음으로 함께 읽어드립니다.

</p>

</div>

</section>

<section class="card-section">

<img src="health.png" class="card-image">

<div class="card-content">

<h2>건강운 타로</h2>

<p>

몸과 마음 · 에너지 · 균형

<br>

현재의 흐름을 함께 살펴봅니다.

</p>

</div>

</section>

<section class="card-section">

<img src="psy.png" class="card-image">

<div class="card-content">

<h2>심리 타로</h2>

<p>

내면 · 감정 · 심리 흐름

<br>

온마음으로 함께 들여다봅니다.

</p>

</div>

</section>

<section class="full-section">

<img src="consultation.png">

</section>

<section class="full-section">

<img src="price.png">

</section>

<section class="full-section ending">

<img src="end.png">

</section>

<div class="reserve-wrap">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank"
class="reserve-btn">

문의예약하기

</a>

</div>

</div>
<div id="status"
style="
position:fixed;
top:10px;
left:50%;
transform:translateX(-50%);
background:white;
padding:10px 20px;
border-radius:20px;
font-size:18px;
font-weight:bold;
z-index:9999;
box-shadow:0 0 10px rgba(0,0,0,0.1);
">

🟢 상담 가능

</div>

<script>

</div>

<script type="module" src="./status.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
"https://fuwojgjmgsvxenmydrfz.supabase.co"


const SUPABASE_KEY =
"sb_publishable_sb_publishable_rzsuJsbir1oa5-vIiE_z-A_f6THK57w"

const supabase =
window.supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
)

async function loadStatus(){

const { data } =
await supabase
.from("status")
.select("*")
.single()

if(!data)return

const map={

open:"🟢 상담 가능",

progress:"🟡 상담중",

close:"🔴 상담 종료"

}

document
.getElementById("status")
.innerText=
map[data.state]

}

loadStatus()

setInterval(
loadStatus,
3000
)

</script>

</script>

</body>
</html>
