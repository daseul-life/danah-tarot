<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>다나 타로</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Noto Sans KR',sans-serif;
background:#f8f3f4;
max-width:760px;
margin:auto;
overflow-x:hidden;
padding-bottom:80px;
}

.section{
padding:18px;
}

.section img{
width:100%;
display:block;
border-radius:24px;
}

.review-wrap{
padding:0 18px 30px;
}

.review-card{
background:white;
padding:22px;
border-radius:20px;
margin-bottom:14px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
border:1px solid #f6dbe5;
}

.review-top{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.review-badge{
background:#ffe5ef;
color:#d35d8b;
padding:6px 12px;
border-radius:999px;
font-size:12px;
font-weight:700;
}

.review-text{
font-size:15px;
line-height:1.8;
color:#4a3b3b;
word-break:keep-all;
}

.faq-wrap{
padding:0 18px 40px;
}

.faq-card{
background:white;
border-radius:20px;
margin-bottom:12px;
padding:18px;
box-shadow:0 5px 20px rgba(0,0,0,.05);
border:1px solid #f6dbe5;
}

.question{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
font-size:16px;
color:#4a3b3b;
gap:10px;
}

.question-left{
display:flex;
align-items:center;
gap:10px;
}

.q{
background:#ffe5ef;
color:#d35d8b;
width:28px;
height:28px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
font-size:13px;
font-weight:700;
flex-shrink:0;
}

.answer{
display:none;
padding-top:16px;
font-size:15px;
line-height:1.8;
color:#666;
}

.faq-card.active .answer{
display:block;
}

.status{
position:fixed;
top:18px;
right:18px;
z-index:999;
background:white;
padding:10px 16px;
border-radius:999px;
font-size:13px;
font-weight:700;
box-shadow:0 5px 15px rgba(0,0,0,.08);
color:#d35d8b;
}

</style>

</head>

<body>

<div class="status" id="status">
🟢 상담 가능
</div>

<div class="section">
<img src="main-cover.jpg">
</div>

<div class="section">
<img src="why-danah.jpg">
</div>

<div class="section">
<img src="price.png">
</div>

<div class="section">
<img src="guide.png">
</div>

<div class="section">
<img src="review-title.png">
</div>

<div class="review-wrap">
<div id="reviews"></div>
</div>

<div class="section">
<img src="faq-title.png">
</div>

<div class="faq-wrap">
<div id="faq-list"></div>
</div>

<div class="section">
<img src="cta.png">
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
"https://fuwojigmgsvxennydcfz.supabase.co",
"sb_publishable_rzsuJsbir1oa5-vIiE_z-A_f6THK57w"
)

async function loadReviews(){

const { data, error } = await supabase
.from("reviews")
.select("*")
.order("id",{ascending:false})

console.log("reviews",data,error)

if(!data) return

document.getElementById("reviews").innerHTML =

data.map(item => `

<div class="review-card">

<div class="review-top">
<div class="review-badge">상담 후기</div>
</div>

<div class="review-text">
${item.content}
</div>

</div>

`).join("")

}

async function loadFAQ(){

const { data, error } = await supabase
.from("faq")
.select("*")
.order("id",{ascending:true})

console.log("faq",data,error)

if(!data) return

document.getElementById("faq-list").innerHTML =

data.map((item,index)=>`

<div class="faq-card" onclick="toggleFAQ(${index})" id="faq-${index}">

<div class="question">

<div class="question-left">

<div class="q">Q</div>

<span>${item.question}</span>

</div>

<div>⌄</div>

</div>

<div class="answer">
${item.answer}
</div>

</div>

`).join("")

}

function toggleFAQ(index){

document
.getElementById(`faq-${index}`)
.classList.toggle("active")

}

loadReviews()
loadFAQ()

</script>

</body>

</html>
