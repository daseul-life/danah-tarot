<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Danah Tarot</title>

<link
href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

html{

scroll-behavior:smooth;

}

body{

font-family:
'Noto Sans KR',
sans-serif;

background:#FFF9F8;

max-width:760px;

margin:auto;

overflow-x:hidden;

padding-bottom:120px;

}

#status{

position:sticky;

top:0;

z-index:999;

padding:15px;

background:

rgba(
255,
255,
255,
0.92
);

backdrop-filter:

blur(10px);

font-size:18px;

font-weight:700;

text-align:center;

color:#D96C92;

box-shadow:

0 3px 15px

rgba(
0,
0,
0,
0.05
);

}

.section{

padding:

48px 18px;

opacity:0;

transform:

translateY(45px);

transition:

1s;

}

.section.show{

opacity:1;

transform:

translateY(0);

}

.section img{

width:100%;

display:block;

border-radius:28px;

height:auto;

object-fit:cover;

box-shadow:

0 10px 30px

rgba(
0,
0,
0,
0.08
);

transition:

0.35s;

}

.section img:hover{

transform:

translateY(-4px);

}

.notice img{

animation:

floating

3s ease-in-out infinite;

}

@keyframes floating{

0%{

transform:

translateY(0);

}

50%{

transform:

translateY(-5px);

}

100%{

transform:

translateY(0);

}

}

.review-wrap{

position:relative;

}

#reviews{

position:absolute;

top:28%;

left:50%;

transform:

translateX(-50%);

width:84%;

display:flex;

flex-direction:column;

gap:12px;

}

.review-card{

background:

rgba(
255,
255,
255,
0.78
);

backdrop-filter:

blur(12px);

padding:15px;

border-radius:18px;

font-size:14px;

box-shadow:

0 5px 18px

rgba(
0,
0,
0,
0.08
);

}

.faq-wrap{

position:relative;

}

#faqBox{

position:absolute;

top:22%;

left:50%;

transform:

translateX(-50%);

width:84%;

display:flex;

flex-direction:column;

gap:10px;

}

.faq-card{

background:

rgba(
255,
255,
255,
0.82
);

backdrop-filter:

blur(12px);

border-radius:18px;

overflow:hidden;

}

.question{

padding:15px;

font-weight:700;

cursor:pointer;

display:flex;

justify-content:

space-between;

}

.answer{

max-height:0;

overflow:hidden;

padding:0 15px;

transition:.35s;

font-size:14px;

}

.faq-card.open .answer{

max-height:220px;

padding:

0 15px 15px;

}

.reserve{

position:fixed;

bottom:18px;

left:50%;

transform:

translateX(-50%);

width:92%;

max-width:700px;

padding:18px;

background:

linear-gradient(

90deg,

#FF75A8,

#FFA5C8

);

border:none;

border-radius:999px;

color:white;

font-size:19px;

font-weight:700;

text-decoration:none;

text-align:center;

box-shadow:

0 8px 25px

rgba(
255,
100,
150,
0.3
);

animation:

pulse 2s infinite;

z-index:999;

}

@keyframes pulse{

50%{

transform:

translateX(-50%)

scale(1.03);

}

}

@media(max-width:600px){

.section{

padding:

40px 16px;

}

#reviews{

top:23%;

}

#faqBox{

top:18%;

}

}

</style>

</head>

<body>

<div id="status">

상담 상태 불러오는중...

</div>

<div class="section">

<a href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="images/main-cover.jpg">

</a>

</div>

<div class="section notice">

<img src="images/info.png">

</div>

<div class="section">

<img src="images/story.png">

</div>

<div class="section">

<img src="images/process-bg.jpg">

</div>

<div class="section">

<a href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="images/why-danah.jpg">

</a>

</div>

<div class="section review-wrap">

<img src="images/review.png">

<div id="reviews"></div>

</div>

<div class="section">

<img src="images/guide.png">

</div>

<div class="section">

<a href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="images/price.png">

</a>

</div>

<div class="section faq-wrap">

<img src="images/faq.png">

<div id="faqBox"></div>

</div>

<div class="section">

<a href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="images/cta.png">

</a>

</div>

<a

class="reserve"

href="https://open.kakao.com/me/DanahsTarot"

target="_blank"

>

💌 상담 예약하기

</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase=

window.supabase.createClient(

"https://fuwojigmgsvxennydcfz.supabase.co",

"sb_publishable_rzsuJsbir1oa5-vIiE_z-A_f6THK57w"

)

const stateMap={

open:

"🟢 상담 가능",

progress:

"🟡 상담중",

close:

"🔴 예약마감"

}

function toggleFAQ(el){

el.parentElement.classList.toggle("open")

}

async function loadStatus(){

const {data}=

await supabase

.from("status")

.select("*")

.order("id",{ascending:false})

.limit(1)

.single()

if(data){

document

.getElementById("status")

.innerHTML=

stateMap[data.state]

}

}

async function loadReview(){

const {data}=

await supabase

.from("reviews")

.select("*")

.order("id")

if(!data)return

document

.getElementById("reviews")

.innerHTML=

data.map(

x=>

`

<div class="review-card">

💬 ${x.content}

</div>

`

).join("")

}

async function loadFAQ(){

const {data}=

await supabase

.from("faq")

.select("*")

.order("id")

if(!data)return

document

.getElementById("faqBox")

.innerHTML=

data.map(

x=>

`

<div class="faq-card">

<div

class="question"

onclick="toggleFAQ(this)">

${x.question}

<span>

▼

</span>

</div>

<div class="answer">

${x.answer}

</div>

</div>

`

).join("")

}

loadStatus()

loadReview()

loadFAQ()

setInterval(

()=>{

loadStatus()

loadReview()

loadFAQ()

},

5000

)

const observer=

new IntersectionObserver(

entries=>{

entries.forEach(

entry=>{

if(

entry.isIntersecting

){

entry.target.classList.add("show")

}

})

}

)

document

.querySelectorAll(".section")

.forEach(

x=>observer.observe(x)

)

</script>

</body>

</html>
