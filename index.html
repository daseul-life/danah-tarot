<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Danah Tarot</title>

<link
href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:'Noto Sans KR',sans-serif;

background:#FFF8F8;

max-width:760px;

margin:auto;

overflow-x:hidden;

padding-bottom:80px;

}

/* 상담 가능 */

.status{

position:fixed;

top:20px;

right:20px;

z-index:999;

background:rgba(255,255,255,.82);

border:1px solid rgba(255,255,255,.7);

padding:8px 14px;

border-radius:999px;

font-size:12px;

font-weight:700;

backdrop-filter:blur(8px);

box-shadow:0 4px 15px rgba(0,0,0,.08);

color:#D96B92;

}

/* 섹션 */

.section{

padding:18px;

}

.section img{

width:100%;

display:block;

border-radius:28px;

box-shadow:0 8px 24px rgba(0,0,0,.08);

}

/* 카드 */

.noticeWrap,
.reviewWrap,
.faqWrap{

padding:0 18px 35px;

}

.notice-card,
.review-card,
.faq-card{

background:rgba(255,255,255,.78);

padding:18px;

border-radius:22px;

margin-bottom:14px;

line-height:1.8;

backdrop-filter:blur(10px);

box-shadow:0 5px 18px rgba(0,0,0,.05);

}

/* FAQ */

.question{

display:flex;

justify-content:space-between;

align-items:center;

font-weight:700;

cursor:pointer;

font-size:16px;

}

.answer{

max-height:0;

overflow:hidden;

transition:.35s;

line-height:1.8;

color:#555;

}

.faq-card.open .answer{

max-height:300px;

padding-top:14px;

}

/* 후기 */

.review-card{

font-size:15px;

color:#444;

}

/* 공지 */

.notice-card{

font-size:15px;

color:#444;

}

/* 모바일 */

@media(max-width:600px){

.status{

top:16px;

right:16px;

font-size:12px;

}

}

</style>

</head>

<body>

<!-- 상담 가능 -->

<div
class="status"
id="status">

🟢 상담 가능

</div>

<!-- 메인 -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/main-cover.jpg">

</a>

</div>

<!-- 공지 -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/info.png">

</div>

<div class="noticeWrap">

<div id="noticeBox"></div>

</div>

<!-- 스토리 -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/story.png">

</div>

<!-- 상담 과정 -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/process-bg.jpg">

</div>

<!-- WHY -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/why-danah.jpg">

</a>

</div>

<!-- 후기 -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/review.png">

</div>

<div class="reviewWrap">

<div id="reviews"></div>

</div>

<!-- 가격 -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/price.png">

</a>

</div>

<!-- FAQ -->

<div class="section">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/faq.png">

</div>

<div class="faqWrap">

<div id="faqBox"></div>

</div>

<!-- CTA -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img
src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/cta.png">

</a>

</div>

<!-- Supabase -->

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(

"https://fuwojigmgsvxennydcfz.supabase.co",

"sb_publishable_rzsuJsbir1oa5-vIiE_z-A_f6THK57w"

)

/* FAQ 열기 */

function toggleFAQ(el){

el.parentElement.classList.toggle("open")

}

/* 상담 상태 */

async function loadStatus(){

const { data } = await supabase

.from("status")

.select("*")

.eq("id",1)

.single()

if(data){

document.getElementById("status").innerText = data.status

}

}

/* 공지 */

async function loadNotice(){

const { data } = await supabase

.from("notice")

.select("*")

.order("id",{ascending:false})

if(!data) return

document.getElementById("noticeBox").innerHTML =

data.map(x => `

<div class="notice-card">

📢 ${x.content}

</div>

`).join("")

}

/* 후기 */

async function loadReview(){

const { data } = await supabase

.from("reviews")

.select("*")

.order("id",{ascending:false})

if(!data) return

document.getElementById("reviews").innerHTML =

data.map(x => `

<div class="review-card">

💬 ${x.content}

</div>

`).join("")

}

/* FAQ */

async function loadFAQ(){

const { data } = await supabase

.from("faq")

.select("*")

.order("id")

if(!data) return

document.getElementById("faqBox").innerHTML =

data.map(x => `

<div class="faq-card">

<div class="question">

<span>

${x.question}

</span>

<span
onclick="toggleFAQ(this.parentElement)"
style="cursor:pointer;">

▼

</span>

</div>

<div class="answer">

${x.answer}

</div>

</div>

`).join("")

}

/* 실행 */

loadStatus()

loadNotice()

loadReview()

loadFAQ()

setInterval(()=>{

loadStatus()

loadNotice()

loadReview()

loadFAQ()

},5000)

</script>

</body>

</html>
