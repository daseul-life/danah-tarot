<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Danah Tarot</title>

<link
href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:
'Noto Sans KR',
sans-serif;

background:#FFF8F8;

max-width:760px;

margin:auto;

overflow-x:hidden;

padding-bottom:60px;

}

.status{

position:fixed;

top:15px;

right:15px;

z-index:999;

background:
rgba(255,255,255,.92);

padding:
10px 16px;

border-radius:999px;

font-size:14px;

font-weight:700;

backdrop-filter:
blur(10px);

box-shadow:
0 4px 18px rgba(0,0,0,.08);

color:#D96B92;

}

.section{

padding:18px;

opacity:0;

transform:
translateY(40px);

transition:1s;

}

.section.show{

opacity:1;

transform:
translateY(0);

}

.section img{

width:100%;

display:block;

border-radius:26px;

box-shadow:
0 8px 24px rgba(0,0,0,.08);

}

.noticeWrap,
.reviewWrap,
.faqWrap{

padding:0 18px 35px;

}

.notice-card,
.review-card,
.faq-card{

background:white;

padding:18px;

border-radius:22px;

margin-bottom:12px;

line-height:1.7;

box-shadow:
0 5px 18px rgba(0,0,0,.05);

}

.question{

display:flex;

justify-content:
space-between;

font-weight:700;

cursor:pointer;

}

.answer{

max-height:0;

overflow:hidden;

transition:.35s;

line-height:1.7;

}

.faq-card.open .answer{

max-height:300px;

padding-top:12px;

}

</style>

</head>

<body>

<div
class="status"
id="status">

🟢 상담 가능

</div>

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/main-cover.jpg">

</a>

</div>

<div class="section">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/info.png">

</div>

<div class="noticeWrap">

<div id="noticeBox"></div>

</div>

<div class="section">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/story.png">

</div>

<div class="section">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/process-bg.jpg">

</div>

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/why-danah.jpg">

</a>

</div>
