<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>다나 타로</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
font-family:'Noto Sans KR',sans-serif;
background:#FFF8F8;
max-width:760px;
margin:auto;
overflow-x:hidden;
padding-bottom:80px;
}

.status{
position:fixed;
top:15px;
right:15px;
z-index:999;
background:rgba(255,255,255,.95);
padding:12px 18px;
border-radius:999px;
font-size:14px;
font-weight:700;
color:#D86D93;
backdrop-filter:blur(10px);
box-shadow:0 8px 25px rgba(216,109,147,.15);
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.05);}
100%{transform:scale(1);}
}

.section{
padding:28px 18px;
opacity:1;
transform:none;
}

.section.show{
opacity:1;
transform:translateY(0);
}

.section img{
width:100%;
display:block;
border-radius:28px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.noticeWrap,
.reviewWrap,
.faqWrap{
padding:0 18px 40px;
}

.notice-card{
background:#fff;
padding:20px;
border-radius:24px;
margin-bottom:14px;
border-left:5px solid #D86D93;
box-shadow:0 8px 24px rgba(216,109,147,.08);
line-height:1.8;
}

.review-card{
background:white;
padding:24px;
border-radius:24px;
margin-bottom:16px;
box-shadow:0 8px 24px rgba(216,109,147,.08);
line-height:1.9;
font-size:15px;
}

.review-card::before{
content:"✦ 상담 후기";
display:block;
font-size:12px;
font-weight:700;
color:#D86D93;
margin-bottom:12px;
}

.faq-card{
background:white;
padding:18px;
border-radius:22px;
margin-bottom:12px;
box-shadow:0 6px 18px rgba(0,0,0,.05);
}

.question{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
font-weight:700;
}

.answer{
max-height:0;
overflow:hidden;
transition:.4s;
line-height:1.8;
color:#666;
}

.faq-card.open .answer{
max-height:300px;
padding-top:14px;
}

.arrow{
transition:.3s;
}

.faq-card.open .arrow{
transform:rotate(180deg);
}

.cta img{
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0);}
50%{transform:translateY(-8px);}
100%{transform:translateY(0);}
}

</style>

</head>

<body>

<div class="status" id="status">
🟢 상담 가능
</div>

<!-- 메인 -->

<div class="section">
<a href="https://open.kakao.com/me/DanahsTarot" target="_blank">
<img src="main-cover.jpg">
</a>
</div>

<!-- 공지 제목 -->

<div class="section">
<img src="info.png">
</div>

<!-- 공지 내용 -->

<div class="noticeWrap">
<div id="noticeBox"></div>
</div>

<!-- 스토리 -->

<div class="section">
<a href="https://open.kakao.com/me/DanahsTarot" target="_blank">
<img src="story.png">
</a>
</div>

<!-- 프로세스 -->

<div class="section">
<img src="process-bg.jpg">
</div>

<!-- 가이드 -->

<div class="section">
<img src="guide.png">
</div>

<!-- 왜 다나타로 -->

<div class="section">
<a href="https://open.kakao.com/me/DanahsTarot" target="_blank">
<img src="why-danah.jpg">
</a>
</div>

<!-- 가격 -->

<div class="section">
<a href="https://open.kakao.com/me/DanahsTarot" target="_blank">
<img src="price.png">
</a>
</div>

<!-- 후기 제목 -->

<div class="section">
<img src="review-title.png">
</div>

<div class="reviewWrap">
<div id="reviews"></div>
</div>

<!-- FAQ 제목 -->

<div class="section">
<img src="faq-title.png">
</div>

<div class="faqWrap">
<div id="faqBox"></div>
</div>

<!-- CTA -->

<div class="section cta">
<a href="https://open.kakao.com/me/DanahsTarot" target="_blank">
<img src="cta.png">
</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase =
window.supabase.createClient(
"https://fuwojigmgsvxennydcfz.supabase.co",
"sb_publishable_rzsuJsbir1oa5-vIiE_z-A_f6THK57w"
)

function toggleFAQ(el){
el.parentElement.classList.toggle("open")
}

async function loadStatus(){

const {data}=await supabase
.from("status")
.select("*")
.eq("id",1)
.single()

if(data){
document.getElementById("status").innerText =
data.status
}

}

async function loadNotice(){

const {data}=await supabase
.from("notice")
.select("*")
.order("id",{ascending:false})

if(!data)return

document.getElementById("noticeBox").innerHTML =

data.map(x=>`

<div class="notice-card">
📢 ${x.content}
</div>

`).join("")

}

async function loadReview(){

const {data}=await supabase
.from("reviews")
.select("*")
.order("id",{ascending:false})

if(!data)return

document.getElementById("reviews").innerHTML =

data.map(x=>`

<div class="review-card">
${x.content}
</div>

`).join("")

}

async function loadFAQ(){

const {data}=await supabase
.from("faq")
.select("*")
.order("id")

if(!data)return

document.getElementById("faqBox").innerHTML =

data.map(x=>`

<div class="faq-card">

<div class="question"
onclick="toggleFAQ(this)">

<span>${x.question}</span>

<span class="arrow">▼</span>

</div>

<div class="answer">
${x.answer}
</div>

</div>

`).join("")

}

loadStatus()
loadNotice()
loadReview()
loadFAQ()

setInterval(()=>{

loadStatus()
loadNotice()
loadReview()
loadFAQ()

},5000)



</script>

</body>
</html>
