<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Danah Tarot</title>

<link
href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{

font-family:
'Noto Sans KR',
sans-serif;

background:#FFF8F8;

max-width:760px;

margin:auto;

overflow-x:hidden;

padding-bottom:80px;

}

/* 상담 상태 */

.status{

position:absolute;

top:20px;

right:20px;

z-index:10;

background:
rgba(255,255,255,.92);

padding:
10px 16px;

border-radius:999px;

font-size:14px;

font-weight:700;

backdrop-filter:
blur(10px);

box-shadow:
0 4px 18px rgba(0,0,0,.08);

color:#D96B92;

}

/* 섹션 */

.section{

padding:18px;

transition:1s;

}

.section img{

width:100%;

display:block;

border-radius:26px;

box-shadow:
0 8px 24px rgba(0,0,0,.08);

}

/* 카드 */

.noticeWrap,
.reviewWrap,
.faqWrap{

padding:0 18px 35px;

}

.notice-card,
.review-card,
.faq-card{

background:white;

padding:18px;

border-radius:22px;

margin-bottom:12px;

line-height:1.7;

box-shadow:
0 5px 18px rgba(0,0,0,.05);

}

/* FAQ */

.question{

display:flex;

justify-content:
space-between;

font-weight:700;

cursor:pointer;

}

.answer{

max-height:0;

overflow:hidden;

transition:.35s;

line-height:1.7;

}

.faq-card.open .answer{

max-height:300px;

padding-top:12px;

}

/* 음악 버튼 */

.musicBtn{

position:fixed;

bottom:20px;

right:20px;

z-index:999;

background:
rgba(255,255,255,.92);

padding:
12px 18px;

border-radius:999px;

font-size:14px;

font-weight:700;

backdrop-filter:
blur(10px);

box-shadow:
0 4px 18px rgba(0,0,0,.08);

color:#D96B92;

cursor:pointer;

}

</style>

</head>

<body>

<!-- 상담 상태 -->

<div
class="status"
id="status">

🟢 상담 가능

</div>

<!-- 메인 -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/main-cover.jpg">

</a>

</div>

<!-- 소개 -->

<div class="section">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/info.png">

</div>

<!-- 공지 -->

<div class="noticeWrap">

<div id="noticeBox"></div>

</div>

<!-- 스토리 -->

<div class="section">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/story.png">

</div>

<!-- 상담 과정 -->

<div class="section">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/process-bg.jpg">

</div>

<!-- 왜 다나 -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/why-danah.jpg">

</a>

</div>

<!-- 리뷰 -->

<div class="section">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/review.png">

</div>

<div class="reviewWrap">

<div id="reviews"></div>

</div>

<!-- 가이드 -->

<div class="section">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/guide.png">

</div>

<!-- 가격 -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/price.png">

</a>

</div>

<!-- FAQ -->

<div class="section">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/faq.png">

</div>

<div class="faqWrap">

<div id="faqBox"></div>

</div>

<!-- CTA -->

<div class="section">

<a
href="https://open.kakao.com/me/DanahsTarot"
target="_blank">

<img src="https://raw.githubusercontent.com/daseul-life/danah-tarot/main/cta.png">

</a>

</div>

<!-- 음악 버튼 -->

<div
class="musicBtn"
onclick="toggleMusic()">

🎵 Music

</div>

<!-- 음악 -->

<audio
id="bgm"
loop
playsinline>

<source
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=relaxing-meditation-112191.mp3"
type="audio/mpeg">

</audio>

<!-- Supabase -->

<script
src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">

</script>

<script>

/* Supabase */

const supabase=

window.supabase.createClient(

"https://fuwojigmgsvxennydcfz.supabase.co",

"sb_publishable_rzsuJsbir1oa5-vIiE_z-A_f6THK57w"

)

/* FAQ */

function toggleFAQ(el){

el.parentElement.classList.toggle(
"open"
)

}

/* 상담 상태 */

async function loadStatus(){

const {data}=await supabase

.from("status")

.select("*")

.eq("id",1)

.single()

if(data){

document.getElementById(
"status"
).innerText=
data.status

}

}

/* 공지 */

async function loadNotice(){

const {data}=await supabase

.from("notice")

.select("*")

.order(
"id",
{
ascending:false
}
)

if(!data)return

document.getElementById(
"noticeBox"
)

.innerHTML=

data.map(x=>`

<div class="notice-card">

📢 ${x.content}

</div>

`).join("")

}

/* 후기 */

async function loadReview(){

const {data}=await supabase

.from("reviews")

.select("*")

.order(
"id",
{
ascending:false
}
)

if(!data)return

document.getElementById(
"reviews"
)

.innerHTML=

data.map(x=>`

<div class="review-card">

💬 ${x.content}

</div>

`).join("")

}

/* FAQ 불러오기 */

async function loadFAQ(){

const {data}=await supabase

.from("faq")

.select("*")

.order("id")

if(!data)return

document.getElementById(
"faqBox"
)

.innerHTML=

data.map(x=>`

<div class="faq-card">

<div
class="question"
onclick="toggleFAQ(this)">

${x.question}

<span>▼</span>

</div>

<div class="answer">

${x.answer}

</div>

</div>

`).join("")

}

/* 음악 */

const bgm=
document.getElementById(
"bgm"
)

window.addEventListener(

"load",

()=>{

bgm.volume=.35

bgm.play().catch(()=>{})

}

)

function toggleMusic(){

if(
bgm.paused
){

bgm.play()

}
else{

bgm.pause()

}

}

/* 실행 */

loadStatus()
loadNotice()
loadReview()
loadFAQ()

setInterval(()=>{

loadStatus()
loadNotice()
loadReview()
loadFAQ()

},5000)

</script>

</body>

</html>
