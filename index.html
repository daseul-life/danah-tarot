<!-- 음악 버튼 -->

<div
class="musicBtn"
onclick="toggleMusic()"
id="musicBtn">

🌙 Sound On

</div>

<audio
id="bgm"
loop
playsinline>

<source
src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=relaxing-meditation-112191.mp3"
type="audio/mpeg">

</audio>

<style>

.musicBtn{

position:fixed;

bottom:20px;

right:20px;

z-index:999;

background:
rgba(255,255,255,.92);

padding:
12px 18px;

border-radius:999px;

font-size:14px;

font-weight:700;

backdrop-filter:
blur(10px);

box-shadow:
0 4px 18px rgba(0,0,0,.08);

color:#D96B92;

cursor:pointer;

animation:float 2s infinite ease-in-out;

}

@keyframes float{

0%{
transform:translateY(0);
}

50%{
transform:translateY(-4px);
}

100%{
transform:translateY(0);
}

}

</style>

<script>

const bgm=
document.getElementById(
"bgm"
)

let playing=false

function fadeInAudio(){

bgm.volume=0

bgm.play()

let volume=0

const fade=setInterval(()=>{

if(volume<0.35){

volume+=0.02

bgm.volume=volume

}
else{

clearInterval(fade)

}

},200)

}

function toggleMusic(){

if(!playing){

fadeInAudio()

playing=true

document
.getElementById(
"musicBtn"
)
.innerText=
"🌙 Sound Off"

}
else{

bgm.pause()

playing=false

document
.getElementById(
"musicBtn"
)
.innerText=
"🌙 Sound On"

}

}

</script>
