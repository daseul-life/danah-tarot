<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Danah 관리자</title>

<style>

body{

font-family:sans-serif;

padding:20px;

}

button{

width:180px;

padding:15px;

margin:10px;

font-size:18px;

}

input{

padding:10px;

font-size:16px;

}

#admin{

display:none;

}

</style>

</head>

<body>

<h2>🔒 Danah 관리자</h2>

<input

type="password"

id="pw"

placeholder="비밀번호 입력">

<button onclick="login()">

확인

</button>

<div id="admin">

<h3>상태 변경</h3>

<button onclick="change('🟢 상담 가능')">

🟢 상담 가능

</button>

<button onclick="change('🟡 상담중')">

🟡 상담중

</button>

<button onclick="change('🔴 상담 종료')">

🔴 상담 종료

</button>

</div>

<script>

function login(){

if(

document.getElementById("pw").value

==="1234"

){

document.getElementById("admin")

.style.display="block"

}else{

alert("비밀번호 틀림")

}

}

function change(status){

localStorage.setItem(

"status",

status

)

alert("변경 완료")

}

</script>

</body>

</html>
