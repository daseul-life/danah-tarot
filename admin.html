<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width,initial-scale=1">

<title>Danah Admin</title>

<link
href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap"
rel="stylesheet">

<style>

*{

margin:0;
padding:0;
box-sizing:border-box;

}

body{

font-family:
'Noto Sans KR',
sans-serif;

background:

#FFF8F8;

padding:20px;

max-width:700px;

margin:auto;

}

.login{

margin-top:100px;

background:white;

padding:25px;

border-radius:28px;

box-shadow:

0 8px 25px

rgba(
0,
0,
0,
0.08
);

}

.panel{

display:none;

}

.card{

background:white;

padding:20px;

border-radius:24px;

margin-bottom:20px;

box-shadow:

0 5px 18px

rgba(
0,
0,
0,
0.06
);

}

h2{

margin-bottom:15px;

color:#D26A91;

}

input,
textarea,
select{

width:100%;

padding:14px;

border:

1px solid #eee;

border-radius:16px;

margin-top:8px;

margin-bottom:12px;

font-size:14px;

}

button{

background:

#E57EA1;

color:white;

border:none;

padding:

14px 18px;

border-radius:16px;

font-size:14px;

cursor:pointer;

width:100%;

margin-top:8px;

}

button:hover{

opacity:.9;

}

</style>

</head>

<body>

<div
class="login"

id="loginBox">

<h2>

Danah Admin

</h2>

<input

id="pw"

type="password"

placeholder=

"비밀번호"

>

<button
onclick=

"login()"

>

로그인

</button>

</div>

<div
class="panel"

id="panel">

<div class="card">

<h2>

상담 상태

</h2>

<select
id="status">

<option>

🟢 상담 가능

</option>

<option>

🟡 상담중

</option>

<option>

🔴 예약 마감

</option>

</select>

<button
onclick=

"saveStatus()"

>

저장

</button>

</div>

<div class="card">

<h2>

공지사항

</h2>

<textarea

id="notice"

placeholder=

"공지 작성"

>

</textarea>

<button
onclick=

"saveNotice()"

>

공지 저장

</button>

</div>

<div class="card">

<h2>

후기 추가

</h2>

<textarea

id="review"

placeholder=

"후기"

>

</textarea>

<button
onclick=

"saveReview()"

>

후기 저장

</button>

</div>

<div class="card">

<h2>

FAQ 추가

</h2>

<input

id="question"

placeholder=

"질문"

>

<textarea

id="answer"

placeholder=

"답변"

>

</textarea>

<button
onclick=

"saveFAQ()"

>

FAQ 저장

</button>

</div>

</div>

<script
src=

"https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"

>

</script>

<script>

const supabase=

window.supabase.createClient(

"https://fuwojigmgsvxennydcfz.supabase.co",

"sb_publishable_rzsuJsbir1oa5-vIiE_z-A_f6THK57w"

)

function login(){

const pw=

document

.getElementById(

"pw"

)

.value

if(

pw==="danah1234"

){

document

.getElementById(

"loginBox"

)

.style.display=

"none"

document

.getElementById(

"panel"

)

.style.display=

"block"

}

else{

alert(

"비밀번호 오류"

)

}

}

async function saveStatus(){

const value=

document

.getElementById(

"status"

)

.value

await supabase

.from("status")

.update({

status:value

})

.eq(

"id",

1

)

alert(

"저장 완료"

)

}

async function saveNotice(){

const value=

document

.getElementById(

"notice"

)

.value

await supabase

.from("notice")

.insert({

content:value

})

alert(

"공지 저장"

)

}

async function saveReview(){

const value=

document

.getElementById(

"review"

)

.value

await supabase

.from("reviews")

.insert({

content:value

})

alert(

"후기 저장"

)

}

async function saveFAQ(){

await supabase

.from("faq")

.insert({

question:

document

.getElementById(

"question"

)

.value,

answer:

document

.getElementById(

"answer"

)

.value

})

alert(

"FAQ 저장"

)

}

</script>

</body>

</html>
